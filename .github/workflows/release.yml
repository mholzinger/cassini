name: release

# Triggered by pushing a version tag:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: cassini-windows-x64.zip
            sep: ";"
          - os: ubuntu-latest
            asset: cassini-linux-x64.tar.gz
            sep: ":"
          - os: macos-latest
            asset: cassini-macos-arm64.tar.gz
            sep: ":"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build one-file binary
        # cassini.py is pulled in automatically (imported by cassini_gui.py);
        # --add-data ships the example map alongside it.
        run: >
          pyinstaller --onefile --name cassini --windowed
          --add-data "examples/mister-restore.tsv${{ matrix.sep }}examples"
          cassini_gui.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/cassini.exe -DestinationPath ${{ matrix.asset }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: tar -czf ${{ matrix.asset }} -C dist cassini.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.asset }} -C dist cassini

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Bundle the Python scripts
        run: |
          mkdir -p pybundle
          cp cassini.py cassini_gui.py README.md pybundle/
          cp -r examples pybundle/
          (cd pybundle && zip -r ../dist/cassini-python.zip .)
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          --title "cassini ${{ github.ref_name }}"
          --generate-notes
          dist/*
